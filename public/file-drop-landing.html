<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .drop {
        width: 64px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(37, 99, 235, 0.38);
        box-shadow:
          0 14px 28px rgba(15, 23, 42, 0.18),
          0 4px 10px rgba(15, 23, 42, 0.14);
      }

      .file {
        position: relative;
        width: 30px;
        height: 38px;
        border-radius: 4px;
        background: linear-gradient(180deg, #ffffff 0%, #eef5ff 100%);
        border: 1px solid #8bb8ff;
      }

      .file::before {
        content: "";
        position: absolute;
        top: -1px;
        right: -1px;
        width: 12px;
        height: 12px;
        background: linear-gradient(135deg, #dbeafe 0 48%, #ffffff 50%);
        border-left: 1px solid #8bb8ff;
        border-bottom: 1px solid #8bb8ff;
        border-radius: 0 4px 0 3px;
      }

      .file::after {
        content: "";
        position: absolute;
        left: 7px;
        bottom: 7px;
        width: 16px;
        height: 3px;
        border-radius: 999px;
        background: #2563eb;
        animation: pulse 1.1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.42;
          transform: scaleX(0.75);
        }
        50% {
          opacity: 1;
          transform: scaleX(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="drop" aria-hidden="true">
      <div class="file"></div>
    </div>
  </body>
</html>
